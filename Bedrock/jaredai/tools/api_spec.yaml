openapi: "3.0.0"
info:
  title: JaredAI Action Group API
  description: >
    GitHub Issue 기반 AI 코드 초안 생성 및 Jira/GitHub/Slack 자동 연동을 위한
    Bedrock Agent Action Group 스키마입니다.
  version: "1.0.0"

paths:
  /create_jira_issue:
    post:
      summary: Jira 티켓 생성
      description: >
        분석이 완료된 코드 초안과 가이드라인을 Jira 프로젝트 보드에
        신규 To-Do 티켓으로 생성합니다.
        티켓 생성 성공 시 Jira Issue ID(예: PROJ-123)를 반환합니다.
      operationId: create_jira_issue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - summary
                - description
              properties:
                summary:
                  type: string
                  description: >
                    Jira 티켓 제목. GitHub Issue 제목을 기반으로 작성.
                    예: "[AI 제안] 회원가입 비밀번호 유효성 규칙 강화"
                description:
                  type: string
                  description: >
                    Jira 티켓 본문. AI가 생성한 코드 초안과 구현 가이드라인을
                    마크다운 형식으로 포함.
                github_issue_number:
                  type: integer
                  description: 연결된 GitHub Issue 번호 (추적용)
                github_issue_url:
                  type: string
                  description: 연결된 GitHub Issue URL
      responses:
        "200":
          description: Jira 티켓 생성 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  jira_issue_id:
                    type: string
                    description: 생성된 Jira 티켓 ID (예: PROJ-123)
                  jira_issue_url:
                    type: string
                    description: 생성된 Jira 티켓 URL
                  status:
                    type: string
                    description: 처리 결과 (success / error)

  /post_github_comment:
    post:
      summary: GitHub Issue에 AI 분석 결과 댓글 등록
      description: >
        AI가 생성한 코드 초안과 Jira 티켓 링크를
        원본 GitHub Issue의 댓글로 마크다운 형식으로 등록합니다.
      operationId: post_github_comment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - issue_number
                - comment_body
              properties:
                issue_number:
                  type: integer
                  description: 댓글을 달 GitHub Issue 번호
                comment_body:
                  type: string
                  description: >
                    등록할 댓글 내용 (마크다운 형식).
                    AI 분석 결과, 코드 초안, Jira 링크 포함.
                jira_issue_id:
                  type: string
                  description: 연결된 Jira 티켓 ID (댓글에 링크로 포함)
                jira_issue_url:
                  type: string
                  description: 연결된 Jira 티켓 URL
      responses:
        "200":
          description: GitHub 댓글 등록 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  comment_id:
                    type: integer
                    description: 생성된 GitHub 댓글 ID
                  comment_url:
                    type: string
                    description: 생성된 댓글 URL
                  status:
                    type: string

  /send_slack_notification:
    post:
      summary: Slack 채널에 완료 알림 전송
      description: >
        모든 연동 프로세스(Jira 티켓 생성, GitHub 댓글 등록)가 완료된 후
        개발팀 Slack 채널에 요약 알림 메시지를 전송합니다.
      operationId: send_slack_notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - github_issue_number
                - github_issue_title
                - jira_issue_id
                - summary
              properties:
                github_issue_number:
                  type: integer
                  description: 처리된 GitHub Issue 번호
                github_issue_title:
                  type: string
                  description: 처리된 GitHub Issue 제목
                github_issue_url:
                  type: string
                  description: GitHub Issue URL
                jira_issue_id:
                  type: string
                  description: 생성된 Jira 티켓 ID (예: PROJ-123)
                jira_issue_url:
                  type: string
                  description: 생성된 Jira 티켓 URL
                summary:
                  type: string
                  description: AI 분석 결과 한 줄 요약
      responses:
        "200":
          description: Slack 알림 전송 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message_ts:
                    type: string
                    description: Slack 메시지 타임스탬프 (추적용)
