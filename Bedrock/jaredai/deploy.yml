name: Jared.ai Serverless CI/CD Deployment

# 1. 트리거 조건: lambdas/ 폴더 내부가 변경되어 main 브랜치에 push될 때만 실행
on:
  push:
    branches:
      - main
    paths:
      - 'jaredai/**'

jobs:
  deploy-lambdas:
    runs-on: ubuntu-latest
    steps:
      # [1단계] GitHub 저장소 코드 체크아웃
      - name: Checkout Repository Code
        uses: actions/checkout@v3

      # [2단계] Python 실행 환경 세팅
      - name: Set up Python
        uses: actions/python-version@v4
        with:
          python-version: '3.11'

      # [3단계] AWS 자격 증명 설정 (Secrets 기반 권한 인증)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2 # 강의 자료와 동일한 서울 리전 세팅

      # [4단계] Lambdas 폴더 내부를 각각 개별 압축하여 AWS Lambda로 코드 업데이트 진행
      - name: Zip and Deploy Each Lambda Function
        run: |
          cd lambdas
          
          # 1. 오케스트레이터 람다 배포
          echo "Deploying Orchestrator Lambda..."
          zip -j orchestrator.zip orchestrator_lambda.py
          aws lambda update-function-code --function-name Jared-Orchestrator-Lambda --zip-file fileb://orchestrator.zip
          
          # 2. 지라 툴 람다 배포
          echo "Deploying Jira Tool Lambda..."
          zip -j jira_tool.zip jira_tool_lambda.py
          aws lambda update-function-code --function-name Jared-Jira-Tool-Lambda --zip-file fileb://jira_tool.zip
          
          # 3. 깃허브 툴 람다 배포
          echo "Deploying GitHub Tool Lambda..."
          zip -j github_tool.zip github_tool_lambda.py
          aws lambda update-function-code --function-name Jared-GitHub-Tool-Lambda --zip-file fileb://github_tool.zip
          
          # 4. 슬랙 툴 람다 배포
          echo "Deploying Slack Tool Lambda..."
          zip -j slack_tool.zip slack_tool_lambda.py
          aws lambda update-function-code --function-name Jared-Slack-Tool-Lambda --zip-file fileb://slack_tool.zip
          
          echo "✅ 모든 자레드 AI 에이전트 람다 함수가 성공적으로 배포되었습니다!"
