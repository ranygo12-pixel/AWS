name: "1️⃣  IAM 역할 설정"

on:
  workflow_dispatch:   # 수동 실행 전용 (최초 1회)

permissions:
  id-token: write
  contents: read

jobs:
  setup-iam:
    name: IAM 역할 생성
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존 패키지 설치
        run: pip install boto3

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: IAM 역할 생성
        run: python scripts/setup_iam.py

      # 출력된 ARN을 Job Summary에 기록 (GitHub Secrets에 수동 등록 필요)
      - name: 결과 요약
        run: |
          echo "## ✅ IAM 설정 완료" >> $GITHUB_STEP_SUMMARY
          echo "스크립트 출력에서 ARN 값을 복사하여 아래 GitHub Secrets를 등록하세요:" >> $GITHUB_STEP_SUMMARY
          echo "- \`LAMBDA_ROLE_ARN\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`AGENT_ROLE_ARN\`" >> $GITHUB_STEP_SUMMARY
