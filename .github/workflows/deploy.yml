name: Jared.ai End-to-End DevSecOps Deployment
on:
  push:
    branches:
      - main
    paths:
      - 'Bedrock/jaredai/**'
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'Bedrock/jaredai/requirements.txt'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Install Dependencies
        run: |
          cd Bedrock/jaredai
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy Lambda Functions
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_INSTANCE_URL: ${{ secrets.JIRA_INSTANCE_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JARED_GITHUB_PAT: ${{ secrets.JARED_GITHUB_PAT }}
          AWS_REGION: ap-northeast-2
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          cd Bedrock/jaredai
          chmod +x infra/deploy.sh
          bash infra/deploy.sh all

      - name: Setup Bedrock Agent
        env:
          AWS_REGION: ap-northeast-2
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          BEDROCK_AGENT_ROLE_ARN: arn:aws:iam::926442180845:role/AmazonBedrockExecutionRoleForKnowledgeBase_0wqmd
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          OPENSEARCH_COLLECTION_ARN: ${{ secrets.OPENSEARCH_COLLECTION_ARN }}
          JIRA_LAMBDA_ARN: arn:aws:lambda:ap-northeast-2:${{ secrets.AWS_ACCOUNT_ID }}:function:jaredai-jira
          GITHUB_LAMBDA_ARN: arn:aws:lambda:ap-northeast-2:${{ secrets.AWS_ACCOUNT_ID }}:function:jaredai-github
          SLACK_LAMBDA_ARN: arn:aws:lambda:ap-northeast-2:${{ secrets.AWS_ACCOUNT_ID }}:function:jaredai-slack
        run: |
          cd Bedrock/jaredai
          python infra/bedrock_agent_setup.py

      - name: Success Notification
        run: echo "Deployment Completed Successfully!"
