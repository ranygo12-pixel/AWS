name: Jared.ai End-to-End DevSecOps Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'Bedrock/jaredai/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'Bedrock/jaredai/requirements.txt'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          
          aws-region: ap-northeast-2

      - name: Deploy Lambda Functions
        # 이 블록을 추가하세요. 이렇게 하면 .env 파일 없이도 
        # deploy.sh에서 즉시 변수 값을 읽을 수 있습니다.
        env:
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_INSTANCE_URL: ${{ secrets.JIRA_INSTANCE_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          JARED_GITHUB_PAT: ${{ secrets.JARED_GITHUB_PAT }}
          AWS_REGION: ap-northeast-2
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          cd Bedrock/jaredai
          chmod +x deploy.sh
          ./deploy.sh all

      - name: Debug env file
        run: |
          cd Bedrock/jaredai
          cat .env

      - name: Install Dependencies
        run: |
          cd Bedrock/jaredai
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy Lambda Functions
        run: |
          cd Bedrock/jaredai
          # .env 로드 후, 명시적으로 AWS_ACCOUNT_ID를 export
          export AWS_ACCOUNT_ID=$AWS_ACCOUNT_ID
          chmod +x infra/deploy.sh
          bash infra/deploy.sh all

      - name: Setup Bedrock Agent
        run: |
          cd Bedrock/jaredai
          python infra/bedrock_agent_setup.py
          
      - name: Success Notification
        run: echo "Deployment Completed Successfully!"
