name: Jared.ai End-to-End DevSecOps Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'Bedrock/jaredai/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'Bedrock/jaredai/requirements.txt'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Create env file
        run: |
          cd Bedrock/jaredai
          echo "JIRA_API_TOKEN=${{ secrets.JIRA_API_TOKEN }}" >> .env
          echo "JIRA_INSTANCE_URL=${{ secrets.JIRA_INSTANCE_URL }}" >> .env
          echo "SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }}" >> .env
          echo "GITHUB_TOKEN=${{ secrets.JARED_PAT }}" >> .env

      - name: Install Dependencies
        run: |
          cd Bedrock/jaredai
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy Lambda Functions
        run: |
          cd Bedrock/jaredai
          chmod +x infra/deploy.sh
          bash infra/deploy.sh all

      - name: Setup Bedrock Agent
        run: |
          cd Bedrock/jaredai
          python infra/bedrock_agent_setup.py
          
      - name: Success Notification
        run: echo "Deployment Completed Successfully!"
